name: opentelemetry-collector
type: charm
subordinate: true
summary: Vendor-agnostic way to receive, process and export telemetry data.
description: |
  OpenTelemetry Collector is a Juju subordinate charm that deploys and manages the
  OpenTelemetry Collector on machines (LXD, MAAS, etc.), providing a vendor-agnostic telemetry
  pipeline for receiving, processing, and exporting metrics, logs, traces, and profiles. It is
  a complementary charm to the Canonical Observability Stack (COS), enabling other charms to
  send their telemetry to COS backends:
  https://documentation.ubuntu.com/observability

  As a subordinate, it is deployed alongside a principal charm and scales automatically with
  it. The collector aggregates telemetry from the host machine and from related charms, then
  forwards it to the appropriate backends such as Prometheus, Mimir, Loki, and Tempo.

  Key features:

  - Vendor-agnostic telemetry collection covering metrics, logs, traces, and profiles in a
    single agent.
  - Multi-protocol trace ingestion supporting OpenTelemetry (OTLP gRPC/HTTP), with additional
    support for Jaeger and Zipkin protocols.
  - Automatic scraping of Prometheus metrics endpoints and collection of log files from the
    host machine.
  - Forwarding of telemetry to COS backends — Prometheus (remote write), Mimir, Loki, and Tempo —
    through Juju relations.
  - Integration with the cos-agent interface for custom scrape jobs, log file paths, alert
    rules, and dashboards provided by principal charms.
  - Built-in Grafana dashboards and alert rules for self-monitoring.
  - TLS support with configurable CA trust via the receive-ca-cert and receive-server-cert
    relations.
  - Configurable processors, sampling rates, scrape intervals, and per-protocol receiver
    toggles.
  - Grafana Cloud integration via the cloud-config relation.
  - External configuration support via the external-config relation, allowing related charms
    (such as opentelemetry-collector-integrator) to inject custom collector configuration snippets
    that are merged into the running configuration.
  - Customizable port mappings to avoid conflicts with other services on the host.

  Known limitations:

  - All receivers feed into all exporters within the same signal pipeline. There is no
    support for selective routing of telemetry from specific receivers to specific exporters.
  - OpenTelemetry Collector connectors are not supported. Features that depend on connectors,
    such as generating metrics from trace spans (spanmetrics), are not available.

links:
  # documentation: https://discourse.charmhub.io/
  website: https://charmhub.io/opentelemetry-collector
  source: https://github.com/canonical/opentelemetry-collector-operator
  issues: https://github.com/canonical/opentelemetry-collector-operator/issues

assumes:
  - juju >= 3.6

platforms:
  ubuntu@22.04:amd64:
  ubuntu@22.04:arm64:
  ubuntu@22.04:s390x:
  ubuntu@24.04:amd64:
  ubuntu@24.04:arm64:
  ubuntu@24.04:s390x:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version
  cos-tool:
    plugin: dump
    source: https://github.com/canonical/cos-tool/releases/latest/download/cos-tool-${CRAFT_ARCH_BUILD_FOR}
    source-type: file
    permissions:
      - path: cos-tool-${CRAFT_ARCH_BUILD_FOR}
        mode: "755"

provides:
  grafana-dashboards-provider:
    interface: grafana_dashboard
    description: |
      Send own and aggregated dashboards to grafana.
  receive-loki-logs:
    interface: loki_push_api
    optional: true
    description: To receive logs by allowing Promtail instances to specify otelcol as their Loki address.
  receive-traces:
    interface: tracing
    optional: true
    description: Receive traces from other charms.
  receive-profiles:
    interface: profiling
    optional: true
    description: Receive profiles from other charms.

requires:
  juju-info:
    description: |
      `juju-info` provides basic compatibility with all charms.
      If all you want is /var/log logs and node_exporter metrics,
      this relation will be enough.
    interface: juju-info
    scope: container
  cos-agent:
    description: |
      `cos-agent` is a dedicated relation for the grafana agent machine
      charm. It will allow you to set up custom scrape jobs, fetch files
      from arbitrary locations, send alert rules, dashboards, etc.
    interface: cos_agent
    scope: container
    optional: true
  grafana-dashboards-consumer:
    interface: grafana_dashboard
    description: |
      Collect dashboards to be forwarded to grafana.
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: To scrape other charms' metrics endpoints.
  send-remote-write:
    interface: prometheus_remote_write
    optional: true
    description: |
      To forward collected metrics to a Prometheus backend.

      The remote write exporter config has ``add_metric_suffixes`` set to
      ``false`` to convert the OTLP metric names used in OpenTelemetry
      instrumentation to Prometheus-compatible names. This maintains parity
      with grafana-agent.
  send-loki-logs:
    interface: loki_push_api
    optional: true
    description: To forward collected logs to a Loki backend.
  receive-ca-cert:
    interface: certificate_transfer
    optional: true
    description: |
      For otelcol to create a trusted (TLS) connection with servers
      it scrapes, pushes to, etc., it needs to trust the CA that signed
      the server it talks to. CA certs forwarded over this relation are
      installed in the root CA store.
  cloud-config:
    interface: grafana_cloud_config
    optional: true
    limit: 1
    description: Forward telemetry to another Observability stack (Grafana Cloud, COS, etc.).
  receive-server-cert:
    interface: tls-certificates
    optional: true
    limit: 1
    description: |
      Obtain a certificate from a CA.
      The charm sends a CSR over this relation and receives a signed certificate back.
      That is the cert that would be presented to incoming TLS connections.
  # TODO: remove limit once https://github.com/canonical/tempo-coordinator-k8s-operator/issues/168 is resolved
  send-traces:
    interface: tracing
    limit: 1
    optional: true
    description: Send workload and charm traces sent to this charm by related charms to a charmed Tempo instance.
  send-charm-traces:
    interface: tracing
    limit: 1
    optional: true
    description: Send this charm's own charm traces to a tracing backend. This is useful for debugging and understanding the behaviour of the charm itself, as opposed to its workload and the workloads that send it telemetry.
  send-profiles:
    interface: profiling
    optional: true
    description: Send any received profiling data to other charms.
  send-otlp:
    interface: otlp
    optional: true
    description: |
      Send OTLP data to an OTLP server by agregating all supported OTLP endpoints offered by the
      server. If multiple endpoints are supported, then the one with the most modern protocol is
      chosen e.g., `gRPC` over `HTTP`.

      This endpoint currently supports:
        - gRPC for ["logs", "metrics"]
        - HTTP for ["logs", "metrics"]
  external-config:
    interface: external-config
    optional: true
    description: |
      Process the configs received and merge them into /etc/otelcol/config.d/[unit].yaml
      If the received config has secrets that have render=file, the secret files will be stored
      in /var/snap/opentelemetry-collector/common/external_config_secrets.

peers:
  peers:
    interface: otelcol_replica

config:
  options:
    processors:
      type: string
      description: |
        A global opentelemetry-collector "processors" config in YAML format, without the
        "processors:" top-level key. For example, to represent a "processors" section
        such as:

            processors:
              batch:
              memory_limiter:
                limit_mib: 4000

        you could use `juju config otelcol processors=@processors.yaml`, with:

            # processors.yaml
            batch:
            memory_limiter:
              limit_mib: 4000

        The provided processors section will be applied to all relevant pipelines.

        Reference: https://opentelemetry.io/docs/collector/configuration/#processors
    forward_alert_rules:
      description: >
        Toggle forwarding of alert rules.
      type: boolean
      default: true
    tls_insecure_skip_verify:
      description: |
        Flag to skip the validation of certificates from servers we connect to with TLS.
        If "true", self-signed certs can be used seamlessly; this setting will be applied
        to all the otelcol exporter configurations and any receivers which actively make
        requests to servers, e.g. the prometheus receiver scraping metrics endpoints.
      type: boolean
      default: false
    path_exclude:
      description: >
        Glob for a set of log files present in `/var/log` that should be ignored by OpenTelemetry Collector.

        For example, `/var/log/**/{app_one,app_two}.log` will result in the agent ignoring both
        `/var/log/app_one.log` and `/var/log/app_two.log`.

        To provide multiple path exclusion globs, separate with semicolons (;), such as
        `/var/log/app_one.log;/var/log/juju`.

        Note that the value you provide here is not interpreted as a path, but rather as a glob matcher.
        Specifically, if you want to exclude logs in the `/var/log/test` folder, you should set the
        config to `/var/log/test/**`.
      type: string
      default: ""
    # Tracing config options
    always_enable_zipkin:
      description: >
        Force-enable the receiver for the 'zipkin' protocol in OpenTelemetry Collector,
        even if there is no integration currently requesting it.
      type: boolean
      default: false
    always_enable_jaeger_grpc:
      description: >
        Force-enable the receiver for the 'jaeger_grpc' protocol in OpenTelemetry Collector,
        even if there is no integration currently requesting it.
      type: boolean
      default: false
    always_enable_jaeger_thrift_http:
      description: >
        Force-enable the receiver for the 'jaeger_thrift_http' protocol in OpenTelemetry Collector,
        even if there is no integration currently requesting it.
      type: boolean
      default: false
    max_elapsed_time_min:
      type: int
      default: 5
      description: |
        Maximum time in minutes to wait for the storage backend. After this time, data loss will occur.
    queue_size:
      type: int
      default: 1000
      description: |
        Maximum number of incoming batches of metrics, logs, traces the queue can accept.
        Ref: https://github.com/open-telemetry/opentelemetry-collector/blob/main/exporter/exporterhelper/README.md#configuration
    tracing_sampling_rate_charm:
      description: >
        This property defines the percentage of charm traces that are sent to the tracing backend.
        Setting it to 100 would mean all charm traces are kept, setting to 0 means charm traces
        aren't sent to the tracing backend at all. Anything outside of 0-100 range will be clamped
        to this range by OpenTelemetry Collector.
      type: float
      default: 100.0
    tracing_sampling_rate_workload:
      description: >
        This property defines the percentage of workload traces that are sent to the tracing backend.
        Setting it to 100 would mean all workload traces are kept, setting to 0 means workload traces
        aren't sent to the tracing backend at all. Anything outside of 0-100 range will be clamped
        to this range by OpenTelemetry Collector.
      type: float
      default: 1.0
    tracing_sampling_rate_error:
      description: >
        This property defines the percentage of error traces (from all sources) that are sent to the tracing backend.
        Setting it to 100 would mean all error traces are kept, setting to 0 means error traces
        aren't sent to the tracing backend at all. Anything outside of 0-100 range will be clamped
        to this range by OpenTelemetry Collector.
      type: float
      default: 100.0
    extra_alert_labels:
      description: >
        Comma separated key-value pairs of labels to be added to all alerts.
        This could be useful for differentiating between staging and production environments.
      type: string
    global_scrape_timeout:
      description: >
        How long to wait before timing out a scrape from a target.
        Supported units: y, w, d, h, m, s.
      type: string
      default: "10s"
    global_scrape_interval:
      description: >
        How frequently should instances be scraped.
        Supported units: y, w, d, h, m, s.
      type: string
      default: "1m"
    debug_exporter_for_logs:
      description: >
        Add a debug exporter to the logs pipeline of the OpenTelemetry Collector config.

        WARNING: Using the debug exporter in a production environment is discouraged, as it will
        write all collected telemetry to stdout, i.e. to syslog, which is likely to cause log
        flooding. This can be avoided with the correct usage of the `path_exclude` config option.
      type: boolean
      default: false
    debug_exporter_for_metrics:
      description: >
        Add a debug exporter to the metrics pipeline of the OpenTelemetry Collector config.

        WARNING: Using the debug exporter in a production environment is discouraged, as it will
        write all collected telemetry to stdout, i.e. to syslog, which is likely to cause log
        flooding. This can be avoided with the correct usage of the `path_exclude` config option.
      type: boolean
      default: false
    debug_exporter_for_traces:
      description: >
        Add a debug exporter to the traces pipeline of the OpenTelemetry Collector config.

        WARNING: Using the debug exporter in a production environment is discouraged, as it will
        write all collected telemetry to stdout, i.e. to syslog, which is likely to cause log
        flooding. This can be avoided with the correct usage of the `path_exclude` config option.
      type: boolean
      default: false
    ports:
      type: string
      description: |
        Comma-separated list of port overrides in the form "name=port[,name=port,...]".
        Only the ports you want to change need to be listed; all others keep their defaults.

        Available port names and their defaults:
          loki_http=3500        HTTP endpoint for Loki log ingestion
          otlp_grpc=4317        gRPC endpoint for OTLP protocol
          otlp_http=4318        HTTP endpoint for OTLP protocol
          metrics=8888          Endpoint for Prometheus metrics scraping
          health=13133          Health check endpoint
          jaeger_grpc=14250     gRPC endpoint for Jaeger protocol
          jaeger_thrift_http=14268  HTTP endpoint for Jaeger Thrift protocol
          zipkin=9411           HTTP endpoint for Zipkin protocol
          node_exporter=9100    HTTP endpoint for node-exporter metrics

        Example — override only the ports that conflict with other services:
          juju config opentelemetry-collector ports="loki_http=3501,otlp_grpc=4320"
      default: ""
    memory_limit_percentage:
      type: string
      description: |
        Request a hard limit for the collector's memory limiter processor as a
        percentage of the total available memory. The resulting processor
        config will be applied to all of the collector's pipelines.
        
        Ref: https://github.com/open-telemetry/opentelemetry-collector/tree/main/processor/memorylimiterprocessor
        
        The collector measures memory usage every second to determine if the
        limits are being exceeded. The calculated (by the charm) hard limit is
        clamped to [0, 100] percent of the total available memory and the soft
        limit is always 80% of the hard limit percentage. A requested limit of
        0% means no memory limit is enforced. For example:

        | user input (%) | hard limit (% of total) | soft limit (% of hard) |
        | -10            | 0 (no limit)            | 0                      |
        | 0              | 0 (no limit)            | 0                      |
        | 50             | 50                      | 40                     |
        | 100            | 100                     | 80                     |

        > Warning: Incoming data can consume additional memory in a Collector
        before the memory limiter processor is able to reject it. Be sure to
        consider this when setting your limits.

        The total available memory is determined by reading the cgroup memory
        limit from `/sys/fs/cgroup/memory.max`. If the file is not present or
        contains "max", the total physical memory of the machine is used
        instead.
      default: "100"

actions:
  reconcile:
    description: >
      Regenerate the world state from scratch. This includes the configuration file,
      but also relation data set by the charm.
